<script>

const hojaCSV = "PEGA_AQUI_TU_LINK_CSV";

let carrito=[];

fetch(hojaCSV)
.then(res => res.text())
.then(data => {

const filas = data.split("\n").slice(1);

let productos=[];

filas.forEach(f => {

let c = f.split(",");

productos.push({

nombre:c[0],
precio:c[1],
categoria:c[2],
imagen:c[3]

});

});

mostrar(productos);

});

function mostrar(productos){

let html="";

productos.forEach((p,i)=>{

html+=`

<div class="producto">

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<p>C$${p.precio}</p>

<button onclick="agregar('${p.nombre}','${p.precio}')">
Agregar
</button>

</div>

`;

});

document.getElementById("productos").innerHTML=html;

}

function agregar(nombre,precio){

carrito.push({nombre,precio});

document.getElementById("cantidad").innerText=carrito.length;

}
