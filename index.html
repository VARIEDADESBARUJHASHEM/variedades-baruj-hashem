<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variedades Baruj Hashem</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

.productos{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.producto{
background:white;
width:200px;
margin:15px;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.producto img{
width:100%;
border-radius:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

</style>

</head>

<body>

<header>
<h1>Variedades Baruj Hashem</h1>
<p>Compra fácil y rápido</p>
</header>

<div class="productos">

<div class="producto">
<img src="https://via.placeholder.com/200">
<h3>Producto 1</h3>
<p>C$200</p>
<button onclick="comprar()">Comprar</button>
</div>

<div class="producto">
<img src="https://via.placeholder.com/200">
<h3>Producto 2</h3>
<p>C$150</p>
<button onclick="comprar()">Comprar</button>
</div>

</div>

<script>
function comprar(){
alert("Producto agregado al pedido");
}
</script>

</body>
</html>
